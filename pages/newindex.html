<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración de Usuario</title>
  <style>
    :root {
      --card:#111827;
      --muted:#d4e0e4;
      --text:#e5e7eb;
      --accent:#56dbc4;
      --accent-2:#f999b7;
      --lock:#64748b;
    }
    body {
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      background: linear-gradient(to right, #23bcd7, #112244);
      color:var(--text);
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }
    header {
      padding:24px 20px 8px;
      max-width:1000px;
      margin:0 auto;
    }
    .title {
      font-size:clamp(20px,2.6vw,34px);
      font-weight:800;
      text-align:center;
    }
    main {
      flex:1;
      width:100%;
      max-width:800px;
      margin:20px auto 80px;
      padding:0 16px;
      display:grid;
      gap:20px;
      box-sizing:border-box;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius:16px;
      padding:20px;
      width:100%;
      box-sizing:border-box;
    }
    .card h3 {
      margin-top:0;
      margin-bottom:12px;
      font-size:18px;
    }
    label {
      display:block;
      margin-bottom:6px;
      font-weight:500;
      font-size:14px;
    }
    input, select {
      width:100%;
      padding:12px;
      margin-bottom:14px;
      border-radius:12px;
      border:1px solid #d4e0e4;
      background:rgba(255,255,255,0.05);
      color:var(--text);
      font-size:15px;
      box-sizing:border-box;
    }
    input[type="file"] {
      border:none;
      background:none;
      padding:4px 0;
    }
    .btn {
      border:none;
      padding:14px 20px;
      border-radius:16px;
      background:var(--accent);
      color:#111827;
      font-weight:600;
      cursor:pointer;
      width:100%;
    }
    .btn:hover { filter:brightness(1.1); }
    .toast {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#112244;
      color:var(--text);
      border:1px solid #1f2937;
      padding:10px 16px;
      border-radius:16px;
      opacity:0;
      pointer-events:none;
    }
    .toast.show {
      opacity:1;
      animation:fade 2.2s ease forwards;
    }
    @keyframes fade {
      0%{opacity:0; transform:translate(-50%,20px)}
      10%{opacity:1; transform:translate(-50%,0)}
      90%{opacity:1}
      100%{opacity:0; transform:translate(-50%,-10px)}
    }
    footer.dock-footer {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      width:auto;
    }
    .dock {
      display:flex;
      gap:25px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      border-radius:16px;
      padding:12px 28px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }
    .dock a {
      font-size:24px;
      text-decoration:none;
      color:#111;
      transition:transform 0.25s ease, color 0.3s;
    }
    .dock a:hover {
      transform:scale(1.3);
      color:var(--accent);
    }

    /* 📱 Mejoras en pantallas pequeñas */
    @media (max-width:600px) {
      header { padding:20px 12px 6px; }
      main { padding:0 12px; }
      .card { padding:16px; }
      .btn { font-size:16px; padding:12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="title">⚙️ Configuración de Usuario</h1>
  </header>

  <main>
    <section class="card">
      <h3>Perfil</h3>
      <label for="foto">Foto de perfil</label>
      <input type="file" id="foto" accept="image/*">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com">
    </section>


    <section class="card">
      <h3>Seguridad</h3>
      <label for="password">Nueva contraseña</label>
      <input type="password" id="password" placeholder="********">
      <label for="password2">Repetir contraseña</label>
      <input type="password" id="password2" placeholder="********">
    </section>

    <section>
      <button class="btn" id="guardar">Guardar cambios</button>
    </section>
  </main>

  <footer class="dock-footer">
    <nav class="dock">
      <a href="landing.html">👤</a>
      <a href="indicadores.html">📊</a>
      <a href="newindex.html">⚙️</a>
      <a href="../index.html">❌</a>
    </nav>
  </footer>

  <div class="toast" id="toast">✅ Cambios guardados</div>

  <script>
    const toast=document.getElementById("toast");
    document.getElementById("guardar").addEventListener("click",()=>{
      toast.classList.add("show");
      setTimeout(()=>toast.classList.remove("show"),2200);
    });
  </script>
</body>
</html>
