<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Plataforma Salud Mental</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-primary: #56dbc4; /* verde */
      --accent-secondary: #00bcd4; /* cian */
      --text-light: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #23bcd7, #112244);
      display: flex;
      flex-direction: column; /* columna: tarjeta arriba, footer abajo */
      justify-content: flex-start; /* alinea arriba */
      align-items: center;
      min-height: 100vh; /* asegura que ocupe toda la pantalla */
      margin: 0;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      width: 95%;
      max-width: 450px;
      backdrop-filter: blur(10px);
      overflow-y: auto;
      max-height: 95vh;
      text-align: center;
      margin-bottom: 10px; /* separa tarjeta del footer */
	  margin-top: 200px;    /* espacio desde arriba */
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .form-group {
      flex: 1 1 100%;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      box-sizing: border-box;
      appearance: none;
    }

    select option { color: #000; }

    input::placeholder { color: rgba(255, 255, 255, 0.8); }

    input:focus, select:focus {
      background: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    a.btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: background .3s ease, color .3s ease, border .3s ease;
    }

    a.btn-primary {
      display: inline-block;
      width: 180px;
      text-align: center;
      margin: 5px;
      padding: 12px 0;
      border-radius: 16px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
      background: var(--accent-primary);
      color: #141e30;
    }

    a.btn-primary:hover {
      background: #56dbc4;
      color: #fff;
    }

    p {
      margin-top: 15px;
      font-size: 14px;
    }

    a {
      color: #f999b7;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .full-width {
      flex: 1 1 100%;
      text-align: center;
    }

    footer {
      text-align: center;
      font-size: 14px;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="../logo.png" alt="Logo" width="100" height="100">
    <br><br>
    <form method="post" action="registro.php">
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="Email" required style="margin-bottom: 15px;">
        <input type="password" id="password" name="password" placeholder="Contraseña" required>
      </div>
      <div class="full-width">
        <a href="../pages/landing.html" class="btn btn-primary">Inicia Sesión</a>
      </div>
    </form>
    <p>¿No tienes una cuenta? <a href="../pages/registro.html">Regístrate</a></p>
  </div>
  <footer>
    <strong>&copy; 2025 Mentana &#x1F9E0;</strong>
  </footer>
</body>
</html>
